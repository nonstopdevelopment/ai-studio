apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-studio-config
data:
  GATEWAY_MODE: live
  VLLM_BASE_URL: http://gemma4-27b-vllm.kuberay-system.svc.cluster.local:8000/v1
  VLLM_MODEL: gemma-4-26B-A4B-it
  GATEWAY_MAX_CONCURRENT: "1"
  GATEWAY_MAX_QUEUE_DEPTH: "10"
  GATEWAY_PER_USER_CONCURRENT: "1"
  GATEWAY_PER_USER_QUEUED: "1"
  GATEWAY_PER_USER_RPM: "6"
  GATEWAY_MIN_INTERVAL_MS: "2500"
  GATEWAY_REQUEST_TIMEOUT_MS: "120000"
  GATEWAY_MAX_OUTPUT_TOKENS: "768"
  GATEWAY_MAX_PROMPT_CHARS: "8000"
  AI_TOOLS_ENABLED: "true"
  AI_TOOL_WEB_SEARCH_ENABLED: "true"
  AI_TOOL_WEB_FETCH_ENABLED: "true"
  AI_TOOL_MAX_SEARCH_RESULTS: "5"
  SEARXNG_BASE_URL: http://ai-studio-searxng:8080
  AI_TOOL_ALLOWED_DOMAINS: "*"
  AI_TOOL_MAX_FETCH_BYTES: "250000"
  AI_TOOL_FETCH_TIMEOUT_MS: "8000"
  AI_TOOL_MAX_REDIRECTS: "2"
  AI_TOOL_MAX_URLS_PER_REQUEST: "2"
  SESSION_TTL_SECONDS: "86400"
  ARTIFACT_TTL_SECONDS: "86400"
  ARTIFACT_DIR: /data/artifacts
  REDIS_URL: redis://ai-studio-valkey:6379
  REDIS_KEY_PREFIX: ai-studio
  REQUIRE_REDIS: "true"
  AUTH_MODE: required
  TAMPADEV_AUTH_AUTHORIZE_URL: https://tampa.dev/oauth/authorize
  TAMPADEV_AUTH_TOKEN_URL: https://tampa.dev/oauth/token
  TAMPADEV_AUTH_REDIRECT_URI: https://ai-studio-nonstopdev-ai.apps.gaspar.ontampa.dev
  TAMPADEV_AUTH_USERINFO_URL: https://api.tampa.dev/v1/me
  TAMPADEV_AUTH_SCOPES: read:user user:email
  THREAD_TTL_SECONDS: "2592000"
