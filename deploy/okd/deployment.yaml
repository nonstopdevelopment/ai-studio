apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-studio
  labels:
    app: ai-studio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-studio
  template:
    metadata:
      labels:
        app: ai-studio
    spec:
      containers:
        - name: ai-studio
          image: image-registry.openshift-image-registry.svc:5000/nonstopdev-ai/ai-studio:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8787
          envFrom:
            - configMapRef:
                name: ai-studio-config
            - secretRef:
                name: ai-studio-admin
                optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: artifacts
              mountPath: /data/artifacts
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: ai-studio-artifacts
